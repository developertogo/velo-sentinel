services:
  triton:
    image: nvcr.io/nvidia/tritonserver:26.03-py3
    platform: linux/amd64
    command: >
      tritonserver --model-repository=/models --log-verbose=1
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # metrics
    volumes:
      - ./models:/models

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Jaeger: Distributed Tracing Backend
  # Collects OTLP traces from Velo-Sentinel on port 4317
  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
