version: "3.9"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:26.03-py3
    platform: linux/amd64
    command: >
      tritonserver --model-repository=/models --log-verbose=1
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # metrics
    volumes:
      - ./models:/models

  redis:
    image: redis:7
    ports:
      - "6379:6379"
