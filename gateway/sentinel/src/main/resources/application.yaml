server:
  port: 8080

spring:
  application:
    name: velo-sentinel
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

velo:
  sentinel:
    routing-mode: SHADOW    # Options: TRITON, DYNAMO, SHADOW, CANARY
    latency-threshold-ms: 200.0  # SLO for shadow mode comparisons
    canary-percentage: 5         # Percentage for CANARY mode
    default-precision: FP16      # Default if not specified
    chaos:
      enabled: false
      failure-rate: 0.1
      latency-rate: 0.2
    hedging:
      enabled: true
      delay-ms: 50.0             # Start hedge after 50ms

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

triton:
  grpc:
    host: localhost
    port: 8001
    model-name: simple
  standby:
    host: ${STANDBY_HOST:secondary.cloud.provider}
    port: ${STANDBY_PORT:8001}
    enabled: true

dynamo:
  grpc:
    host: localhost
    port: 9001

metal:
  grpc:
    host: localhost
    port: 7001                   # Local Velo-Core (Metal)
    model-name: phi-2-metal      # Small local-eligible model


resilience4j:
  circuitbreaker:
    instances:
      dynamoBackend:
        registerHealthMap: true
        slidingWindowSize: 10              # Look at the last 10 calls
        failureRateThreshold: 50           # Open if 50% fail
        slowCallRateThreshold: 50          # Open if 50% are slow
        slowCallDurationThreshold: 500ms   # Define "slow" for local simulation
        waitDurationInOpenState: 10s       # Stay open for 10s before trying again
        permittedNumberOfCallsInHalfOpenState: 3

logging:
  level:
    org:
      springframework:
        web: DEBUG
    # Optional: You can also monitor your own code's logic
    com:
      velo:
        sentinel: DEBUG