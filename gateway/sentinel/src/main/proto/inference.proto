syntax = "proto3";

package com.velo.sentinel.grpc;

option java_multiple_files = true;
option java_package = "com.velo.sentinel.grpc";
option java_outer_classname = "InferenceProto";

service DynamoService {
  rpc Infer (DynamoInferenceRequest) returns (DynamoInferenceResponse);
}

message DynamoInferenceRequest {
  float input_value = 1;
  string session_id = 2;
}

message DynamoInferenceResponse {
  float prediction = 1;
  string status = 2;
}
